version: "3"
internal: true

tasks:
  update:
    desc: "Update Swift dependencies (swift package update)"
    silent: false
    cmds:
      - cmd: |
          cd packages/swift && swift package update
        ignore_error: false

  upgrade:
    desc: "Upgrade Swift dependencies (swift package update)"
    silent: false
    cmds:
      - cmd: |
          cd packages/swift && swift package update
        ignore_error: false
